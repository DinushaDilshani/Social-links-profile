<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      background-color: hsl(0, 0%, 8%);
      font-family:Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height:100vh;
    }
    .main-content {
      background-color: hsl(0, 0%, 12%);
      width: 300px;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      color: hsl(0, 0%, 100%);
    }
    .profile-photo img{
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
    }
    .profile-name {
      font-weight: 700;
      margin:10px 0;
    }
    .profile-location {
      color: hsl(75, 94%, 57%);
      margin:5px 0;
    }
    .profile-bio {
      font-weight: 400;
      margin:10px 0;;
    }
    .social-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }
    .social-links a {
      background-color: hsl(0, 0%, 20%);
      color: hsl(0, 0%, 100%);
      text-decoration: none;
      padding: 10px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
      margin-top: 15px;
    }
    .attribution a {
      color: hsl(228, 45%, 44%);
    }

  /* Responsive for larger screens */
  @media (min-width: 768px) {
    .main-content {
      max-width: 400px;
    }
  }

  @media (min-width: 1024px) {
    .main-content {
      max-width: 500px;       /* scales nicely on desktop */
      padding: 30px;
    }
    .profile-photo img {
      width: 120px;
      height: 120px;
    }
  }

  @media (min-width: 1440px) {
    .main-content {
      max-width: 600px;       /* matches design spec */
    }
  }
  </style>
</head>
<body>
  <div id="main-container" class="main-content">
    <div id="profile-image" class="profile-photo">
      <img src="./assets/images/avatar-jessica.jpeg" alt="Profile Image">
    </div>
    <div id="profile-header" class="profile-name">
      <h2>Jessica Randall</h2>
    </div>
    <div id="profile-city" class="profile-location">
      <p>London, United Kingdom</p>
    </div>
    <div id="description" class="profile-bio">
      <p>"Front-end developer and avid reader."</p>
    </div>
    <div id="social-media" class="social-links">
       <a href="#">GitHub</a>
      <a href="#">Frontend Mentor</a>
      <a href="#">LinkedIn</a>
      <a href="#">Twitter</a>
      <a href="#">Instagram</a>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Dinusha Dilshani</a>.
  </footer>
</body>
</html>
